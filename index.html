<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jason Yung</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 720px;
      margin: 80px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 0.2em;
    }

    a {
      color: #000;
      text-decoration: underline;
    }

    /* ---- Image Grid ---- */

    .image-grid {
      margin-top: 60px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .image-grid img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      background: #eee;
    }

    /* Responsive: stack to 2 columns on small screens */
    @media (max-width: 700px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Responsive: stack to 1 column on very small screens */
    @media (max-width: 420px) {
      .image-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Jason Yung</h1>

  <p>
    New Media Artist & Creative Technologist
  </p>

  <p>
    <a href="mailto:you@email.com">Email</a> ·
    <a href="https://www.instagram.com/jasonyungart/">Instagram</a> ·
    <a href="#">GitHub</a>
  </p>

  <!-- Image Grid -->
  <div class="image-grid">
    <img src="images/1.jpg" alt="">
    <img src="images/2.jpg" alt="">
    <img src="images/3.jpg" alt="">
    <img src="images/4.jpg" alt="">
    <img src="images/5.jpg" alt="">
    <img src="images/6.jpg" alt="">
    <img src="images/7.jpg" alt="">
    <img src="images/8.jpg" alt="">
    <img src="images/9.jpg" alt="">
  </div>

</body>
</html>
